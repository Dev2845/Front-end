<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        nav{
            display: flex;
            background: lightblue;
            justify-content: space-between;
            align-items: center;
        }
        ul li{
            display: inline-block;
            padding: 10px 20px;
        }
        a{
            color: black;
            text-decoration: none;
            /* font-family: 'Times New Roman', Times, serif; */
            font-size: 20px;
        }
        #sec1{
            display: flex;
            background: antiquewhite;
        }
        .box{
            width: 25%;
            height: 300px;
            border: 2px solid;
        }
        #sec2{
            display: flex;
            background: blanchedalmond;
        }
        .box1{
            width: 25%;
            height: 300px;
            border: 2px solid;
        }
        #box2{
            display: flex;
            flex-direction: row;
        }
        .left,.right{
            width: 50%;
            height: 300px;
            border: 2px solid grey;
        }
        #box3{
            display: flex;
            flex-direction: column;
        }
        .top,.bottom{
            height: 50%;
            width: 100%;
            border: 2px solid steelblue;
        }

    </style>
</head>

<nav>

    <ul>

    </ul>

</nav>
<section id="sec1">

        <div class="right">right</div>
    </div>
    <div class="box" id="box3">

        <div class="bottom">bottom</div>
    </div>
    <div class="box">4</div>
     </section>
    
    <section id="sec2">
        <div class="box1">1</div>

</section>
</body>
</html>
