<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Data Types</title>
</head>
<body>

    <h2>Check the Console Output</h2>

    <script>
        // String
        let name = "John";

        // Number
        let age = 25;

        // Boolean
        let isStudent = true;

        // Null
        let address = null;

        // Undefined
        let phoneNumber;

        // Display values and types
        console.log("Value:", name, "| Type:", typeof name);
        console.log("Value:", age, "| Type:", typeof age);
        console.log("Value:", isStudent, "| Type:", typeof isStudent);
        console.log("Value:", address, "| Type:", typeof address);
        console.log("Value:", phoneNumber, "| Type:", typeof phoneNumber);
    </script>

</body>
</html>
