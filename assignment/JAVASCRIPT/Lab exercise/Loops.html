<!DOCTYPE html>
<html>
<head>
    <title>Loop Examples</title>
</head>
<body>

<h2>Open Console (F12) to See Output</h2>

<script>
    // Task 1: For Loop
    console.log("Numbers from 1 to 10:");
    for (let i = 1; i <= 10; i++) {
        console.log(i);
    }

    // Task 2: While Loop
    let num = 2;
    let sum = 0;

    while (num <= 20) {
        sum += num;
        num += 2;
    }

    console.log("Sum of even numbers =", sum);

    // Task 3: Do-While Loop
    console.log("Counting from 1 to 5:");
    let count = 1;

    do {
        console.log(count);
        count++;
    } while (count <= 5);
</script>

</body>
</html>
