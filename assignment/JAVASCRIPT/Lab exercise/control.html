<!DOCTYPE html>
<html>
<head>
    <title>If-Else and Switch Example</title>
</head>
<body>

<script>
    // Task 1
    let num = 10;

    if (num > 0) {
        console.log("Positive Number");
    } else if (num < 0) {
        console.log("Negative Number");
    } else {
        console.log("Zero");
    }

    // Task 2
    let day = 5;

    switch (day) {
        case 1:
            console.log("Monday");
            break;
        case 2:
            console.log("Tuesday");
            break;
        case 3:
            console.log("Wednesday");
            break;
        case 4:
            console.log("Thursday");
            break;
        case 5:
            console.log("Friday");
            break;
        case 6:
            console.log("Saturday");
            break;
        case 7:
            console.log("Sunday");
            break;
        default:
            console.log("Invalid Day");
    }
</script>

</body>
</html>
