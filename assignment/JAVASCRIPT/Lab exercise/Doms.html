<!DOCTYPE html>
<html>
<head>
    <title>DOM Manipulation Example</title>
</head>
<body>

    <p id="message">Hello, World!</p>

    <script>
        // Select the paragraph
        let para = document.getElementById("message");

        // Change the text
        para.textContent = "JavaScript is fun!";

        // Change the color
        para.style.color = "blue";
    </script>

</body>
</html>
