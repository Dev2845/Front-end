<!DOCTYPE html>
<html>
<head>
    <title>Array Tasks</title>
</head>
<body>

<h2>Open Console (F12) to View Output</h2>

<script>
    // Task 1
    let fruits = ["apple", "banana", "cherry"];

    fruits.push("mango");   // Add fruit
    fruits.shift();         // Remove first fruit

    console.log("Modified Array:", fruits);

    // Task 2
    let numbers = [10, 20, 30, 40, 50];
    let sum = 0;

    for (let i = 0; i < numbers.length; i++) {
        sum += numbers[i];
    }

    console.log("Sum of Array Elements =", sum);
</script>

</body>
</html>
