<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Functions Example</title>
</head>
<body>

    <h2>Open the Console (F12) to View Output</h2>

    <script>
        // Task 1: Greeting Function
        function greetUser(name) {
            console.log("Hello, " + name + "!");
        }

        greetUser("John");

        // Task 2: Sum Function
        function calculateSum(num1, num2) {
            return num1 + num2;
        }

        let result = calculateSum(10, 20);
        console.log("Sum =", result);
    </script>

</body>
</html>
