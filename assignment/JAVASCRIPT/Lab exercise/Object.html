<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Object Example</title>
</head>
<body>

<h2>Open Console (F12) to View Output</h2>

<script>
    // Create a car object
    let car = {
        brand: "Toyota",
        model: "Camry",
        year: 2022
    };

    // Access and print brand and model
    console.log("Brand:", car.brand);
    console.log("Model:", car.model);

    // Update the year property
    car.year = 2024;

    // Add a new property
    car.color = "Black";

    // Display updated object
    console.log("Updated Car Object:", car);
</script>

</body>
</html>
