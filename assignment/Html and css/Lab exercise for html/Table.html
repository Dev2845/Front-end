<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog</title>
</head>
<body>

    <h2 style="text-align:center;">Product Catalog</h2>

    <table style="width:100%; border:2px solid black; border-collapse:collapse; text-align:center;">

        <!-- Table Header -->
        <thead style="background-color:lightgray;">
            <tr>
                <th style="border:1px solid black;">Product Name</th>
                <th style="border:1px solid black;">Product Image</th>
                <th style="border:1px solid black;">Price</th>
                <th style="border:1px solid black;">Description</th>
                <th style="border:1px solid black;">Availability</th>
            </tr>
        </thead>

        <tbody>

            <!-- Product 1 -->
            <tr>
                <td style="border:1px solid black;">Laptop</td>
                <td style="border:1px solid black;">
                    <img src="https://encrypted-tbn2.gstatic.com/shopping?q=tbn:ANd9GcRZkkgHSEFM9Rq3jUwnxjTfeFS1Spn3EUIZwSx7URJw16_CyYAJcgRGZbSH8O7G6HTlccTMD1A-H_QqEy0GFGHptxL0suc0R3xABEwXwr2AUva99lkqlCJ_o1tMTYF1BL0FTd58NEdEQK8&usqp=CAc" alt="Laptop" height="100px" width="100px">
                </td>
                <td style="border:1px solid black;">₹50,000</td>
                <td style="border:1px solid black;">High-performance laptop for work and study.</td>
                <td style="border:1px solid black;">In Stock</td>
            </tr>

            <!-- Product 2 -->
            <tr>
                <td style="border:1px solid black;">Smartphone</td>
                <td style="border:1px solid black;">
                    <img src="https://image01-in.oneplus.net/media/202604/07/b0f9fb50caddfe90e14e5865cf405cc7.png?x-amz-process=image/format,webp/quality,Q_80" alt="Smartphone" height="100px" width="100px">
                </td>
                <td style="border:1px solid black;">₹25,000</td>
                <td style="border:1px solid black;" rowspan="2">
                    Latest electronic gadgets with advanced features.
                </td>
                <td style="border:1px solid black;">In Stock</td>
            </tr>

            <!-- Product 3 -->
            <tr>
                <td style="border:1px solid black;">Tablet</td>
                <td style="border:1px solid black;">
                    <img src="https://encrypted-tbn2.gstatic.com/shopping?q=tbn:ANd9GcQ-FPLzFtykNQf7xohfMR9vOZBF-bfJlRYSkrsTnZuQs2NmzrNa2_kL8ztqeVcactTk-cRExr4L-Yv7__FcaVErXOcuqKtILHuh6D3nZuWRaPYI4v82jfBFEir7mRv7oc4J8eIM6A&usqp=CAc" alt="Tablet" height="100px" width="100px">
                </td>
                <td style="border:1px solid black;">₹18,000</td>
                <td style="border:1px solid black;">Out of Stock</td>
            </tr>

            <!-- Merged Row using colspan -->
            <tr>
                <td colspan="5" style="border:1px solid black; background-color:lightyellow;">
                    Special Offer: Free Delivery on All Products
                </td>
            </tr>

        </tbody>
    </table>

</body>
</html>
