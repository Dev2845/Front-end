<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Layout</title>
    <link rel="stylesheet" href="Flexbox.css">
</head>
<body>

    <header class="header">
        <h1>My Website Header</h1>
    </header>

    <div class="container">
        <aside class="sidebar">
            <h2>Sidebar</h2>
            <ul>
                <li>Home</li>
                <li>About</li>
                <li>Services</li>
                <li>Contact</li>
            </ul>
        </aside>

        <main class="content">
            <h2>Main Content Area</h2>
            <p>
                This is the main content section. Flexbox is used to align
                the sidebar and content area side by side.
            </p>
        </main>
    </div>

    <footer class="footer">
        <p>© 2026 My Website. All Rights Reserved.</p>
    </footer>

</body>
</html>
