<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Grid</title>
    <link rel="stylesheet" href="Grid.css">
</head>
<body>

    <h1>Product Catalog</h1>

    <div class="product-grid">

        <div class="card">
            <img src="https://m.media-amazon.com/images/I/61WM6IDaBPL._AC_UY327_FMwebp_QL65_.jpg" alt="Product 1">
            <h3>Smartphone</h3>
            <p class="price">$499</p>
        </div>

        <div class="card">
            <img src="https://m.media-amazon.com/images/I/71K4CpdfmHL._AC_UY327_FMwebp_QL65_.jpg" alt="Product 2">
            <h3>Laptop</h3>
            <p class="price">$899</p>
        </div>

        <div class="card">
            <img src="https://m.media-amazon.com/images/I/61OvmIbqbvL._AC_UY327_FMwebp_QL65_.jpg" alt="Product 3">
            <h3>Headphones</h3>
            <p class="price">$99</p>
        </div>

        <div class="card">
            <img src="https://m.media-amazon.com/images/I/717+Bu7jtLL._AC_UY327_FMwebp_QL65_.jpg" alt="Product 4">
            <h3>Smart Watch</h3>
            <p class="price">$199</p>
        </div>

        <div class="card">
            <img src="https://m.media-amazon.com/images/I/81Tib6mb8eL._AC_UY327_FMwebp_QL65_.jpg" alt="Product 5">
            <h3>Camera</h3>
            <p class="price">$599</p>

            <p class="price">$299</p>

            <h3>Keyboard</h3>
            <p class="price">$49</p>
        </div>

        <div class="card">
            <img src="https://m.media-amazon.com/images/I/61D7dUYR3DL._AC_UY327_FMwebp_QL65_.jpg" alt="Product 8">
            <h3>Mouse</h3>
            <p class="price">$29</p>
        </div>

        <div class="card">
            <img src="https://m.media-amazon.com/images/I/61dqzNpSZXL._AC_UY327_FMwebp_QL65_.jpg" alt="Product 9">

            <p class="price">$79</p>

</html>
