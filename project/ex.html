<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dropdown with Modal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
  .search-input {
  background: url('https://cdn.jsdelivr.net/npm/bootstrap-icons/icons/search.svg') no-repeat 10px center;
  background-size: 16px;
  padding-left: 35px;
}
</style>
<body class="p-5">


  <!-- Dropdown -->
  <div class="dropdown" data-bs-toggle="modal" data-bs-target="#demo4">
    <button class="btn btn-primary dropdown-toggle" type="button" data-bs-toggle="dropdown">
      Open Menu
    </button>

    <ul class="dropdown-menu">
      <li><a class="dropdown-item" href="#">Action</a></li>

      <!-- Modal Trigger -->
      <li>
        <button class="dropdown-item">
          Open Modal
        </button>
      </li>
    </ul>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="demo4" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Modal Title</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          This modal was opened from a dropdown!
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button class="btn btn-primary">Save changes</button>
        </div>

      </div>
    </div>
  </div>
<input type="text" class="form-control search-input" placeholder="Search...">
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
